services:
  #  Base Mongo
  mongo:
    image: mongo:7.0
    container_name: sep25_opa1_mongo
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - sep25_opa1_network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Base PostgreSQL
  postgres:
    image: postgres:16
    container_name: sep25_opa1_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    networks:
      - sep25_opa1_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: sep25_opa1_pgadmin4
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5436:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - sep25_opa1_network
    depends_on:
      - postgres

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sep25_opa1_api
    ports:
      - "8001:8000"
    environment:
      # MongoDB settings
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
      # PostgreSQL settings
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: postgres
      POSTGRES_PORT: 5432
      # Binance API URLs
      URL_HISTORIQUE: ${URL_HISTORIQUE:-https://api.binance.com/api/v3/klines}
      URL_STREAM: ${URL_STREAM:-wss://stream.binance.com:9443/ws}
      # Autopopulate data on first run (set to 'false' to skip)
      POPULATE_DATA: ${POPULATE_DATA:-false}
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - sep25_opa1_network
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Streamlit Dashboard (remplace Dash)
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: sep25_opa1_streamlit
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      PYTHONUNBUFFERED: 1
    volumes:
      - ./src:/app/src
    networks:
      - sep25_opa1_network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Scheduler basique désactivé — remplacé par Apache Airflow
  # scheduler:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.scheduler
  #   (conservé en commentaire pour référence)

  # ---------------------------------------------------------------------------
  # Monitoring — Prometheus + Grafana
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: sep25_opa1_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sep25_opa1_network
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: sep25_opa1_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: password
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - sep25_opa1_network
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Apache Airflow — base de données de métadonnées dédiée
  # ---------------------------------------------------------------------------
  postgres-airflow:
    image: postgres:16
    container_name: sep25_opa1_postgres_airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pg_airflow_data:/var/lib/postgresql/data
    networks:
      - sep25_opa1_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Airflow init (one-shot) — migration DB + création utilisateur admin
  # ---------------------------------------------------------------------------
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: sep25_opa1_airflow_init
    depends_on:
      postgres-airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: sep25_opa1_secret
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./models:/opt/airflow/models
    networks:
      - sep25_opa1_network
    command:
      - bash
      - -c
      - "airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@cryptobot.local --password admin"

  # ---------------------------------------------------------------------------
  # Airflow Webserver — UI sur http://localhost:8080  (admin / admin)
  # ---------------------------------------------------------------------------
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: sep25_opa1_airflow_webserver
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: sep25_opa1_secret
      # Variables applicatives transmises aux tâches Python des DAGs
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
      MONGO_COLLECTION_HISTORICAL: ${MONGO_COLLECTION_HISTORICAL:-historical_daily_data}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: postgres
      POSTGRES_PORT: 5432
      URL_HISTORIQUE: ${URL_HISTORIQUE:-https://api.binance.com/api/v3/klines}
      PYTHONPATH: /opt/airflow
      PYTHONUNBUFFERED: 1
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./models:/opt/airflow/models
    ports:
      - "8080:8080"
    networks:
      - sep25_opa1_network
    command: webserver
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Airflow Scheduler — exécute les DAGs selon leur schedule
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: sep25_opa1_airflow_scheduler
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: sep25_opa1_secret
      # Variables applicatives transmises aux tâches Python des DAGs
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
      MONGO_COLLECTION_HISTORICAL: ${MONGO_COLLECTION_HISTORICAL:-historical_daily_data}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: postgres
      POSTGRES_PORT: 5432
      URL_HISTORIQUE: ${URL_HISTORIQUE:-https://api.binance.com/api/v3/klines}
      PYTHONPATH: /opt/airflow
      PYTHONUNBUFFERED: 1
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./models:/opt/airflow/models
    networks:
      - sep25_opa1_network
    command: scheduler
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:
  pgadmin_data:
  pg_airflow_data:
  airflow_logs:
  prometheus_data:
  grafana_data:

networks:
  sep25_opa1_network:
    driver: bridge
